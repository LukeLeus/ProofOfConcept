<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentKit — Project taken</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="project-taken">

  <div class="app-shell">
    <aside class="sidebar">
      <a href="../index.html" class="sidebar-logo" style="text-decoration:none; color:var(--accent);">Dashboard</a>
      <div class="sidebar-section">
        <div class="sidebar-label">Projecten</div>
        <a href="project-libema.html" class="sidebar-item">Libéma open</a>
        <a href="project.html" class="sidebar-item">ZLM Tour</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label tools">Tools</div>
        <a href="inspiratie.html" class="sidebar-item">Inspiratie</a>
        <a href="trendwatcher.html" class="sidebar-item">Trendwatcher</a>
        <a href="analyse.html" class="sidebar-item">Analyse</a>
        <a href="test-doelgroep/index.html" class="sidebar-item">Test doelgroep</a>
        <a href="kennis-hub.html" class="sidebar-item">Kennis hub</a>
        <a href="todos.html" class="sidebar-item">To do's</a>
      </div>
    </aside>

    <main class="main">
      <a onclick="history.back()" class="back-link">← Terug</a>
      <h1 class="page-title" id="project-titel">Project taken</h1>

      <div id="taken-container"></div>

      <div style="display:flex; justify-content:center; margin-top:24px;">
        <a href="todo-toevoegen.html" class="btn btn-dark">＋ TOEVOEGEN</a>
      </div>
    </main>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Haal projectnaam op uit URL parameter
      const params = new URLSearchParams(window.location.search);
      const project = params.get('project') || '';
      document.getElementById('project-titel').textContent = project || 'Project taken';

      const taken = JSON.parse(localStorage.getItem('taken') || '[]');
      const afgevinkt = JSON.parse(localStorage.getItem('afgevinkt') || '[]');

      // Filter op project
      const projectTaken = taken.filter(t => t.project === project);

      // Groepeer per teamlid
      const perPersoon = {};
      projectTaken.forEach(t => {
        const naam = t.teamlid || 'Niet toegewezen';
        if (!perPersoon[naam]) perPersoon[naam] = [];
        perPersoon[naam].push(t);
      });

      const container = document.getElementById('taken-container');

      if (Object.keys(perPersoon).length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);">Geen taken gevonden voor dit project.</p>';
        return;
      }

      // Render per persoon
      Object.entries(perPersoon).forEach(([persoon, taken]) => {
        const sectie = document.createElement('div');
        sectie.style.marginBottom = '32px';
        sectie.innerHTML = `
          <h3 style="font-size:16px; font-weight:700; margin-bottom:12px; color:var(--blue);">${persoon}</h3>
        `;

        taken.forEach(t => {
          const isKlaar = afgevinkt.includes(t.titel);
          const item = document.createElement('div');
          item.className = 'todo-item' + (isKlaar ? ' klaar' : '');
          item.setAttribute('data-status', isKlaar ? 'klaar' : 'open');
          item.innerHTML = `
            <div class="todo-check ${isKlaar ? 'klaar' : ''}" onclick="vinkAf(this)"></div>
            <div class="todo-content">
              <div class="todo-title">${t.titel}</div>
              ${t.beschrijving ? `<div style="font-size:12px; color:var(--text-muted);">${t.beschrijving}</div>` : ''}
            </div>
            <span class="todo-date">${t.datum}</span>
          `;
          sectie.appendChild(item);
        });

        container.appendChild(sectie);
      });
    });

    function vinkAf(el) {
      el.classList.toggle('klaar');
      const item = el.closest('.todo-item');
      item.classList.toggle('klaar');

      const titel = item.querySelector('.todo-title').textContent;
      const afgevinkt = JSON.parse(localStorage.getItem('afgevinkt') || '[]');
      if (item.classList.contains('klaar')) {
        if (!afgevinkt.includes(titel)) afgevinkt.push(titel);
      } else {
        afgevinkt.splice(afgevinkt.indexOf(titel), 1);
      }
      localStorage.setItem('afgevinkt', JSON.stringify(afgevinkt));
    }
  </script>
</body>

</html>
