<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentKit — To-do toevoegen</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<style>
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        color: var(--text-secondary);
        text-decoration: none;
        margin-bottom: 24px;
        transition: color 0.15s;
    }

    .back-link:hover {
        color: var(--text-primary);
    }
</style>

<body data-page="home">

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-logo" style="text-decoration:none; color:var(--accent);">Dashboard</a>
            <div class="sidebar-section">
                <div class="sidebar-label">Projecten</div>
                <a href="pages/project-libema.html" class="sidebar-item" data-target="project-libema">Libéma open</a>
                <a href="pages/project.html" class="sidebar-item" data-target="project-zlm">ZLM Tour</a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label tools">Tools</div>
                <a href="pages/inspiratie.html" class="sidebar-item" data-target="inspiratie">Inspiratie</a>
                <a href="pages/trendwatcher.html" class="sidebar-item" data-target="trendwatcher">Trendwatcher</a>
                <a href="pages/analyse.html" class="sidebar-item" data-target="analyse">Analyse</a>
                <a href="pages/test-doelgroep/index.html" class="sidebar-item" data-target="test-doelgroep">Test
                    doelgroep</a>
                <a href="pages/kennis-hub.html" class="sidebar-item" data-target="kennis-hub">Kennis hub</a>
                <a href="todos.html" class="sidebar-item" data-target="todos">To do's</a>
            </div>
        </aside>

        <div class="app-shell">
            <main class="main">
                <a onclick="history.back()" class="back-link">← Terug</a>
                <h1 class="page-title">To-do toevoegen</h1>

                <div style="max-width: 560px; display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="todo-titel" placeholder="Taaknaam"
                        style="padding:12px 16px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-size:15px; background:var(--bg);">
                    <input type="datetime-local" id="todo-datum"
                        style="padding:12px 16px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-size:15px; background:var(--bg);">
                    <select id="todo-project" onchange="updateTeamleden()"
                        style="padding:12px 16px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-size:15px; background:var(--bg);">
                        <option value="">Kies een project...</option>
                    </select>
                    <textarea id="todo-beschrijving" placeholder="Beschrijving (optioneel)"
                        style="padding:12px 16px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-size:15px; background:var(--bg); resize:vertical; min-height:80px;"></textarea>

                    <select id="todo-teamlid" disabled
                        style="padding:12px 16px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-size:15px; background:var(--bg); opacity:0.4; cursor:not-allowed;">
                        <option value="">Kies eerst een project...</option>
                    </select>

                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button class="btn btn-primary" onclick="slaanOp()">Opslaan</button>
                        <a onclick="navigeerTerug()" class="btn btn-ghost" style="cursor:pointer;">Annuleren</a>
                    </div>

                </div>
            </main>
        </div>

        <script src="../js/todo-toevoegen.js"></script>
        <script src="../js/nav.js"></script>
</body>

</html>
