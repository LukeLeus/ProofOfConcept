<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentKit — Doelgroep vergelijking</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .vergelijk-header {
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
      gap:16px; max-width:860px; margin-bottom:32px;
    }
    .event-naam-lg { font-size:20px; font-weight:700; }
    .event-type-lg { font-size:13px; color:var(--text-muted); }
    .vs-badge { font-size:18px; font-weight:700; color:var(--text-muted); text-align:center; }

    .vergelijk-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:860px; }

    .verg-kolom { display:flex; flex-direction:column; gap:12px; }
    .verg-kaart { background:var(--card-bg); border-radius:12px; padding:18px 20px; }
    .verg-kaart-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:8px; }
    .verg-kaart-inhoud { font-size:14px; line-height:1.6; color:var(--text-primary); }

    .tag-rij { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .tag { font-size:12px; background:var(--bg); padding:4px 10px; border-radius:100px; color:var(--text-secondary); border:1px solid var(--border); }

    .overeenkomst-kaart {
      background:var(--card-bg); border-radius:12px; padding:18px 20px;
      grid-column:span 2;
    }

    .score-rij { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .score-naam { font-size:13px; width:160px; flex-shrink:0; }
    .score-balk-bg { flex:1; height:8px; background:var(--border); border-radius:100px; overflow:hidden; }
    .score-balk-a { height:100%; background:var(--accent); border-radius:100px; transition:width 1s ease; }
    .score-balk-b { height:100%; background:var(--blue); border-radius:100px; transition:width 1s ease; }
    .score-waarde { font-size:13px; font-weight:600; width:32px; text-align:right; }

    .legenda { display:flex; gap:20px; margin-bottom:16px; }
    .legenda-item { display:flex; align-items:center; gap:6px; font-size:13px; }
    .legenda-dot { width:12px; height:12px; border-radius:3px; }

    .laden-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 0; gap:16px; grid-column:span 2; }
    .laden-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .actie-rij { display:flex; gap:10px; margin-top:24px; max-width:860px; }
  </style>
</head>
<body data-page="test-doelgroep">
<div class="app-shell">
  <aside class="sidebar">
    <a href="../../index.html" class="sidebar-logo" style="text-decoration:none; color:var(--accent);">Dashboard</a>
    <div class="sidebar-section">
      <div class="sidebar-label">Projecten</div>
      <a href="../project-libema.html" class="sidebar-item">Libéma open</a>
      <a href="../project.html" class="sidebar-item">ZLM Tour</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label tools">Tools</div>
      <a href="../inspiratie.html" class="sidebar-item">Inspiratie</a>
      <a href="../trendwatcher.html" class="sidebar-item">Trendwatcher</a>
      <a href="../analyse.html" class="sidebar-item">Analyse</a>
      <a href="index.html" class="sidebar-item active">Test doelgroep</a>
      <a href="../kennis-hub.html" class="sidebar-item">Kennis hub</a>
      <a href="../todos.html" class="sidebar-item">To do's</a>
    </div>
  </aside>

  <main class="main">
    <a onclick="history.back()" class="back-link">← Terug</a>
    <h1 class="page-title">Doelgroepvergelijking</h1>
    <p class="page-subtitle" id="subtitel">Analyse wordt uitgevoerd…</p>

    <div class="vergelijk-header" id="verg-header" style="display:none;">
      <div>
        <div class="event-naam-lg" id="naam-a">—</div>
        <div class="event-type-lg" id="type-a">—</div>
      </div>
      <div class="vs-badge">VS</div>
      <div style="text-align:right;">
        <div class="event-naam-lg" id="naam-b">—</div>
        <div class="event-type-lg" id="type-b">—</div>
      </div>
    </div>

    <div class="vergelijk-grid" id="vergelijk-grid">
      <div class="laden-state">
        <div class="laden-spinner"></div>
        <div class="laden-tekst" id="laden-tekst">Doelgroepen worden vergeleken…</div>
      </div>
    </div>

    <div class="actie-rij" id="actie-rij" style="display:none;">
      <a href="stap-1-vergelijk.html" class="btn btn-ghost">← Andere events kiezen</a>
      <a href="index.html" class="btn btn-primary">Klaar</a>
    </div>
  </main>
</div>

<script src="../../js/nav.js"></script>
<script>
  const a = JSON.parse(sessionStorage.getItem('verg_a') || '{}');
  const b = JSON.parse(sessionStorage.getItem('verg_b') || '{}');

  if (a.naam) {
    document.getElementById('naam-a').textContent = a.icon + ' ' + a.naam;
    document.getElementById('type-a').textContent = a.type;
    document.getElementById('naam-b').textContent = b.icon + ' ' + b.naam;
    document.getElementById('type-b').textContent = b.type;
    document.getElementById('verg-header').style.display = 'grid';
  }

  const laadTexten = ['Doelgroepen worden geanalyseerd…', 'Demografieën worden vergeleken…', 'Overeenkomsten worden gezocht…', 'Inzichten worden verwerkt…'];
  let idx = 0;
  const laadInterval = setInterval(() => {
    idx = (idx + 1) % laadTexten.length;
    const el = document.getElementById('laden-tekst');
    if (el) el.textContent = laadTexten[idx];
  }, 1400);

  async function voerVergelijkingUit() {
    const prompt = `Vergelijk de doelgroepen van twee sportevenementen op het gebied van social media content marketing.

Event A: ${a.naam} (${a.type})
Event B: ${b.naam} (${b.type})

Geef je analyse ALLEEN als JSON (geen markdown, geen uitleg erbuiten):
{
  "doelgroep_a": {
    "leeftijd": "<leeftijdsbereik>",
    "geslacht": "<verdeling>",
    "interesses": ["<tag1>", "<tag2>", "<tag3>", "<tag4>"],
    "platforms": ["<platform1>", "<platform2>"],
    "contentvoorkeur": "<korte omschrijving max 1 zin>",
    "score_betrokkenheid": <getal 1-10>,
    "score_bereik": <getal 1-10>,
    "score_loyaliteit": <getal 1-10>
  },
  "doelgroep_b": {
    "leeftijd": "<leeftijdsbereik>",
    "geslacht": "<verdeling>",
    "interesses": ["<tag1>", "<tag2>", "<tag3>", "<tag4>"],
    "platforms": ["<platform1>", "<platform2>"],
    "contentvoorkeur": "<korte omschrijving max 1 zin>",
    "score_betrokkenheid": <getal 1-10>,
    "score_bereik": <getal 1-10>,
    "score_loyaliteit": <getal 1-10>
  },
  "overeenkomsten": "<wat hebben de doelgroepen gemeen — max 2 zinnen>",
  "verschillen": "<belangrijkste verschillen — max 2 zinnen>",
  "content_tip": "<praktische contenttip voor beide events — max 2 zinnen>"
}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      clearInterval(laadInterval);

      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const r = JSON.parse(clean);

      document.getElementById('subtitel').textContent = r.overeenkomsten;
      renderVergelijking(r);

    } catch (e) {
      clearInterval(laadInterval);
      document.getElementById('vergelijk-grid').innerHTML = `
        <div style="grid-column:span 2; padding:40px 0; text-align:center; color:var(--text-muted);">
          <div style="font-size:32px; margin-bottom:12px;">⚠️</div>
          <div>De vergelijking kon niet worden uitgevoerd. Controleer je verbinding.</div>
          <button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px;">Opnieuw</button>
        </div>`;
      document.getElementById('actie-rij').style.display = 'flex';
    }
  }

  function renderVergelijking(r) {
    const da = r.doelgroep_a;
    const db = r.doelgroep_b;

    document.getElementById('vergelijk-grid').innerHTML = `

      <!-- Kolom A -->
      <div class="verg-kolom">
        <div class="verg-kaart">
          <div class="verg-kaart-label">Leeftijd & geslacht</div>
          <div class="verg-kaart-inhoud">${da.leeftijd} · ${da.geslacht}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Interesses</div>
          <div class="tag-rij">${da.interesses.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Populaire platforms</div>
          <div class="tag-rij">${da.platforms.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Contentvoorkeur</div>
          <div class="verg-kaart-inhoud">${da.contentvoorkeur}</div>
        </div>
      </div>

      <!-- Kolom B -->
      <div class="verg-kolom">
        <div class="verg-kaart">
          <div class="verg-kaart-label">Leeftijd & geslacht</div>
          <div class="verg-kaart-inhoud">${db.leeftijd} · ${db.geslacht}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Interesses</div>
          <div class="tag-rij">${db.interesses.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Populaire platforms</div>
          <div class="tag-rij">${db.platforms.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="verg-kaart">
          <div class="verg-kaart-label">Contentvoorkeur</div>
          <div class="verg-kaart-inhoud">${db.contentvoorkeur}</div>
        </div>
      </div>

      <!-- Scores vergelijking -->
      <div class="verg-kaart" style="grid-column:span 2;">
        <div class="verg-kaart-label" style="margin-bottom:14px;">Scores vergelijking</div>
        <div class="legenda">
          <div class="legenda-item"><div class="legenda-dot" style="background:var(--accent)"></div>${a.naam}</div>
          <div class="legenda-item"><div class="legenda-dot" style="background:var(--blue)"></div>${b.naam}</div>
        </div>

        <div class="score-rij">
          <div class="score-naam">Betrokkenheid</div>
          <div class="score-balk-bg"><div class="score-balk-a" style="width:${da.score_betrokkenheid*10}%"></div></div>
          <div class="score-waarde">${da.score_betrokkenheid}</div>
        </div>
        <div class="score-rij" style="margin-bottom:16px;">
          <div class="score-naam"></div>
          <div class="score-balk-bg"><div class="score-balk-b" style="width:${db.score_betrokkenheid*10}%"></div></div>
          <div class="score-waarde">${db.score_betrokkenheid}</div>
        </div>

        <div class="score-rij">
          <div class="score-naam">Bereikpotentieel</div>
          <div class="score-balk-bg"><div class="score-balk-a" style="width:${da.score_bereik*10}%"></div></div>
          <div class="score-waarde">${da.score_bereik}</div>
        </div>
        <div class="score-rij" style="margin-bottom:16px;">
          <div class="score-naam"></div>
          <div class="score-balk-bg"><div class="score-balk-b" style="width:${db.score_bereik*10}%"></div></div>
          <div class="score-waarde">${db.score_bereik}</div>
        </div>

        <div class="score-rij">
          <div class="score-naam">Loyaliteit</div>
          <div class="score-balk-bg"><div class="score-balk-a" style="width:${da.score_loyaliteit*10}%"></div></div>
          <div class="score-waarde">${da.score_loyaliteit}</div>
        </div>
        <div class="score-rij">
          <div class="score-naam"></div>
          <div class="score-balk-bg"><div class="score-balk-b" style="width:${db.score_loyaliteit*10}%"></div></div>
          <div class="score-waarde">${db.score_loyaliteit}</div>
        </div>
      </div>

      <!-- Overeenkomsten en verschillen -->
      <div class="overeenkomst-kaart">
        <div class="verg-kaart-label" style="margin-bottom:12px;">Inzichten</div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;">
          <div>
            <div style="font-size:11px; font-weight:700; color:#4CAF50; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">Overeenkomsten</div>
            <div style="font-size:14px; line-height:1.6;">${r.overeenkomsten}</div>
          </div>
          <div>
            <div style="font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">Verschillen</div>
            <div style="font-size:14px; line-height:1.6;">${r.verschillen}</div>
          </div>
          <div>
            <div style="font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">Content tip</div>
            <div style="font-size:14px; line-height:1.6;">${r.content_tip}</div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('actie-rij').style.display = 'flex';
  }

  voerVergelijkingUit();
</script>
</body>
</html>
