<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentKit — Vergelijk · Kies project</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .stap-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .stap-badge {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(255, 85, 51, 0.1);
            padding: 4px 10px;
            border-radius: 100px;
        }

        .voortgang {
            display: flex;
            gap: 6px;
            margin-bottom: 32px;
            max-width: 680px;
        }

        .vp-stap {
            height: 4px;
            flex: 1;
            border-radius: 100px;
            background: var(--border);
        }

        .vp-stap.actief {
            background: var(--accent);
        }

        .vp-stap.klaar {
            background: var(--accent);
            opacity: 0.4;
        }

        .project-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 560px;
            margin-top: 24px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .project-card.geselecteerd {
            border-color: var(--accent);
            background: rgba(255, 85, 51, 0.06);
        }

        .project-icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
        }

        .project-naam {
            font-size: 14px;
            font-weight: 600;
        }

        .project-type {
            font-size: 12px;
            color: var(--text-muted);
        }

        .actie-rij {
            display: flex;
            gap: 10px;
            margin-top: 28px;
            max-width: 560px;
        }
    </style>
</head>

<body data-page="test-doelgroep">
    <div class="app-shell">
        <aside class="sidebar">
            <a href="../../index.html" class="sidebar-logo"
                style="text-decoration:none; color:var(--accent);">Dashboard</a>
            <div class="sidebar-section">
                <div class="sidebar-label">Projecten</div>
                <a href="../project-libema.html" class="sidebar-item">Libéma open</a>
                <a href="../project.html" class="sidebar-item">ZLM Tour</a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label tools">Tools</div>
                <a href="../inspiratie.html" class="sidebar-item">Inspiratie</a>
                <a href="../hooks.html" class="sidebar-item">Hooks</a>
                <a href="../trendwatcher.html" class="sidebar-item">Trendwatcher</a>
                <a href="../analyse.html" class="sidebar-item">Analyse</a>
                <a href="index.html" class="sidebar-item active">Test doelgroep</a>
                <a href="../kennis-hub.html" class="sidebar-item">Kennis hub</a>
                <a href="../todos.html" class="sidebar-item">To do's</a>
            </div>
        </aside>
        <main class="main">
            <a onclick="history.back()" class="back-link">← Terug</a>
            <div class="stap-header">
                <span class="stap-badge">Stap 1 van 3</span>
                <span style="font-size:13px; color:var(--text-muted);">Doelgroep vergelijken</span>
            </div>
            <h1 class="page-title">Voor welk project doe je dit?</h1>
            <p class="page-subtitle">Kies het project waarvoor je inspiratie zoekt.</p>
            <div class="voortgang">
                <div class="vp-stap actief"></div>
                <div class="vp-stap"></div>
                <div class="vp-stap"></div>
            </div>
            <div class="project-grid" id="project-grid"></div>
            <div class="actie-rij">
                <button class="btn btn-primary" id="volgende-btn" disabled onclick="gaNaarStap2()">Volgende →</button>
                <a href="index.html" class="btn btn-ghost">Annuleren</a>
            </div>
        </main>
    </div>
    <script src="../../js/nav.js"></script>
    <script>
        const projectIcons = {
            'Libéma open': { icon: '🎾', type: "Tennis · 's-Hertogenbosch" },
            'ZLM Tour': { icon: '🚴', type: 'Wielrennen · Zeeland & Brabant' },
        };

        const opgeslagen = JSON.parse(localStorage.getItem('projecten') || '[]');
        const alle = ['Libéma open', 'ZLM Tour', ...opgeslagen.filter(p => p !== 'Libéma open' && p !== 'ZLM Tour')];

        const grid = document.getElementById('project-grid');
        alle.forEach(naam => {
            const meta = projectIcons[naam] || { icon: '📁', type: 'Project' };
            const div = document.createElement('div');
            div.className = 'project-card';
            div.innerHTML = `<div class="project-icon">${meta.icon}</div><div><div class="project-naam">${naam}</div><div class="project-type">${meta.type}</div></div>`;
            div.onclick = () => {
                document.querySelectorAll('.project-card').forEach(c => c.classList.remove('geselecteerd'));
                div.classList.add('geselecteerd');
                sessionStorage.setItem('verg_eigen', naam);
                sessionStorage.setItem('verg_eigen_icon', meta.icon);
                sessionStorage.setItem('verg_eigen_type', meta.type);
                document.getElementById('volgende-btn').disabled = false;
            };
            grid.appendChild(div);
        });

        const params = new URLSearchParams(window.location.search);
        const vanuitProject = params.get('project');
        if (vanuitProject) {
            sessionStorage.setItem('verg_eigen', vanuitProject);
            const meta = projectIcons[vanuitProject] || { icon: '📁', type: 'Project' };
            sessionStorage.setItem('verg_eigen_icon', meta.icon);
            sessionStorage.setItem('verg_eigen_type', meta.type);
            window.location.href = 'verg-stap-2-vergelijk.html';
        }

        function gaNaarStap2() {
            window.location.href = 'verg-stap-2-vergelijk.html';
        }
    </script>
</body>

</html>
