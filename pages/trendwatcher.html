<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentKit — Trendwatcher</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ---- Twee kolommen layout ---- */
    .trend-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ---- Sectie header (badge + "Zie meer") ---- */
    .trend-section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .zie-meer {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }

    .zie-meer:hover {
      text-decoration: underline;
    }

    /* ---- Trend afbeelding thumbnails ---- */
    .trend-media-row {
      display: flex;
      gap: 12px;
    }

    .trend-thumb {
      flex: 1;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-bg);
    }

    .trend-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .trend-thumb .thumb-label {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px;
    }

    /* ---- Statistiek label onder thumbnails ---- */
    .trend-stat {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .trend-stat.positive {
      color: var(--green);
    }

    .trend-stat.negative {
      color: var(--accent);
    }

    /* ---- Scheidingslijn tussen secties ---- */
    .trend-divider {
      grid-column: 1 / -1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
