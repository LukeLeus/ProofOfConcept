<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentKit — Kennis toevoegen</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .form-section {
            margin-bottom: 28px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Tag selectie */
        .tag-selectie {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag-btn {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.12s;
            font-family: 'DM Sans', sans-serif;
        }

        .tag-btn.platform {
            background: #EAF2FF;
            color: #3A6EA8;
            border-color: #EAF2FF;
        }

        .tag-btn.hook {
            background: #FFF3E0;
            color: #E65100;
            border-color: #FFF3E0;
        }

        .tag-btn.trend {
            background: #F3E5F5;
            color: #7B1FA2;
            border-color: #F3E5F5;
        }

        .tag-btn.ontwikk {
            background: #E8F5E9;
            color: #2E7D32;
            border-color: #E8F5E9;
        }

        .tag-btn.doel {
            background: #FCE4EC;
            color: #C62828;
            border-color: #FCE4EC;
        }

        .tag-btn.selected {
            border-color: currentColor;
            font-weight: 700;
        }

        /* Bronnen */
        .bron-rij {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .bron-rij input {
            flex: 1;
        }

        .bron-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            padding: 4px;
        }

        /* Voorbeelden */
        .voorbeeld-rij {
            position: relative;
            margin-bottom: 8px;
        }

        .voorbeeld-remove {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Project selectie */
        .project-selectie {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .project-btn {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.12s;
        }

        .project-btn.selected {
            background: var(--text-primary);
            color: white;
            border-color: var(--text-primary);
        }
    </style>
</head>

<body data-page="kennis-hub">

    <div class="app-shell">
        <aside class="sidebar">
            <a href="../index.html" class="sidebar-logo"
                style="text-decoration:none; color:var(--accent);">Dashboard</a>
            <div class="sidebar-section">
                <div class="sidebar-label">Projecten</div>
                <a href="project-libema.html" class="sidebar-item">Libéma open</a>
                <a href="project.html" class="sidebar-item">ZLM Tour</a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label tools">Tools</div>
                <a href="inspiratie.html" class="sidebar-item">Inspiratie</a>
                <a href="trendwatcher.html" class="sidebar-item">Trendwatcher</a>
                <a href="analyse.html" class="sidebar-item">Analyse</a>
                <a href="test-doelgroep/index.html" class="sidebar-item">Test doelgroep</a>
                <a href="kennis-hub.html" class="sidebar-item active">Kennis hub</a>
                <a href="todos.html" class="sidebar-item">To do's</a>
            </div>
        </aside>

        <main class="main">
            <a onclick="history.back()" class="back-link">← Terug</a>
            <h1 class="page-title">Kennis toevoegen</h1>

            <div style="max-width:680px;">

                <!-- Titel -->
                <div class="form-section">
                    <label class="form-label">Titel / onderwerp</label>
                    <input type="text" id="k-titel" placeholder="Bijv. '3 hooks die altijd werken op Instagram'">
                </div>

                <!-- Tags: Platform -->
                <div class="form-section">
                    <label class="form-label">Platform</label>
                    <div class="tag-selectie">
                        <button class="tag-btn platform"
                            onclick="toggleTag(this,'Instagram','tag-platform')">Instagram</button>
                        <button class="tag-btn platform"
                            onclick="toggleTag(this,'TikTok','tag-platform')">TikTok</button>
                        <button class="tag-btn platform"
                            onclick="toggleTag(this,'Facebook','tag-platform')">Facebook</button>
                        <button class="tag-btn platform"
                            onclick="toggleTag(this,'LinkedIn','tag-platform')">LinkedIn</button>
                        <button class="tag-btn platform"
                            onclick="toggleTag(this,'YouTube','tag-platform')">YouTube</button>
                    </div>
                </div>

                <!-- Tags: Type -->
                <div class="form-section">
                    <label class="form-label">Type kennis</label>
                    <div class="tag-selectie">
                        <button class="tag-btn hook" onclick="toggleTag(this,'Hook','tag-hook')">Hook</button>
                        <button class="tag-btn trend" onclick="toggleTag(this,'Trend','tag-trend')">Trend</button>
                        <button class="tag-btn ontwikk"
                            onclick="toggleTag(this,'Ontwikkeling','tag-ontwikk')">Ontwikkeling</button>
                        <button class="tag-btn doel" onclick="toggleTag(this,'Bereik','tag-doel')">Bereik</button>
                        <button class="tag-btn doel"
                            onclick="toggleTag(this,'Engagement','tag-doel')">Engagement</button>
                        <button class="tag-btn doel" onclick="toggleTag(this,'Conversie','tag-doel')">Conversie</button>
                    </div>
                </div>

                <!-- Project -->
                <div class="form-section">
                    <label class="form-label">Relevant voor project</label>
                    <div class="project-selectie" id="project-selectie">
                        <button class="project-btn" onclick="toggleProject(this)">Alle projecten</button>
                    </div>
                </div>

                <!-- Inhoud -->
                <div class="form-section">
                    <label class="form-label">Inhoud / uitleg</label>
                    <textarea id="k-inhoud" placeholder="Beschrijf de kennis, tips, stappen of inzichten..."></textarea>
                </div>

                <!-- Bronnen -->
                <div class="form-section">
                    <label class="form-label">Bronnen & links</label>
                    <div id="bronnen-lijst">
                        <div class="bron-rij">
                            <input type="text" placeholder="Naam bron (bijv. 'Later.com artikel')">
                            <input type="text" placeholder="URL (https://...)">
                            <button class="bron-remove" onclick="verwijderRij(this)">✕</button>
                        </div>
                    </div>
                    <button class="btn btn-ghost" style="font-size:13px; margin-top:8px;" onclick="voegBronToe()">＋ Bron
                        toevoegen</button>
                </div>

                <!-- Voorbeelden -->
                <div class="form-section">
                    <label class="form-label">Voorbeelden</label>
                    <div id="voorbeelden-lijst">
                        <div class="voorbeeld-rij">
                            <input type="text" placeholder="Beschrijf een concreet voorbeeld...">
                            <button class="voorbeeld-remove" onclick="verwijderRij(this)">✕</button>
                        </div>
                    </div>
                    <button class="btn btn-ghost" style="font-size:13px; margin-top:8px;" onclick="voegVoorbeeldToe()">＋
                        Voorbeeld toevoegen</button>
                </div>

                <!-- Knoppen -->
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button class="btn btn-primary" onclick="slaanOp()">Opslaan</button>
                    <a onclick="history.back()" class="btn btn-ghost" style="cursor:pointer;">Annuleren</a>
                </div>

            </div>
        </main>
    </div>

    <script src="../js/nav.js"></script>
    <script>
        let geselecteerdeTags = [];
        let geselecteerdeTagClasses = [];
        let geselecteerdeProjecten = [];

        function toggleTag(btn, tag, cls) {
            btn.classList.toggle('selected');
            if (btn.classList.contains('selected')) {
                geselecteerdeTags.push(tag);
                geselecteerdeTagClasses.push(cls);
            } else {
                const i = geselecteerdeTags.indexOf(tag);
                if (i > -1) { geselecteerdeTags.splice(i, 1); geselecteerdeTagClasses.splice(i, 1); }
            }
        }

        function toggleProject(btn) {
            btn.classList.toggle('selected');
            const naam = btn.textContent.trim();
            if (btn.classList.contains('selected')) {
                geselecteerdeProjecten.push(naam);
            } else {
                const i = geselecteerdeProjecten.indexOf(naam);
                if (i > -1) geselecteerdeProjecten.splice(i, 1);
            }
        }

        function voegBronToe() {
            const div = document.createElement('div');
            div.className = 'bron-rij';
            div.innerHTML = `
        <input type="text" placeholder="Naam bron">
        <input type="text" placeholder="URL (https://...)">
        <button class="bron-remove" onclick="verwijderRij(this)">✕</button>
      `;
            document.getElementById('bronnen-lijst').appendChild(div);
        }

        function voegVoorbeeldToe() {
            const div = document.createElement('div');
            div.className = 'voorbeeld-rij';
            div.innerHTML = `
        <input type="text" placeholder="Beschrijf een concreet voorbeeld...">
        <button class="voorbeeld-remove" onclick="verwijderRij(this)">✕</button>
      `;
            document.getElementById('voorbeelden-lijst').appendChild(div);
        }

        function verwijderRij(btn) {
            btn.closest('.bron-rij, .voorbeeld-rij').remove();
        }

        function slaanOp() {
            const titel = document.getElementById('k-titel').value.trim();
            if (!titel) { alert('Voer een titel in.'); return; }

            // Bronnen verzamelen
            const bronRijen = document.querySelectorAll('.bron-rij');
            const bronnen = [];
            bronRijen.forEach(rij => {
                const inputs = rij.querySelectorAll('input');
                const label = inputs[0].value.trim();
                const url = inputs[1].value.trim();
                if (label) bronnen.push({ label, url });
            });

            // Voorbeelden verzamelen
            const vbRijen = document.querySelectorAll('.voorbeeld-rij input');
            const voorbeelden = [];
            vbRijen.forEach(inp => {
                if (inp.value.trim()) voorbeelden.push({ tekst: inp.value.trim() });
            });

            const item = {
                titel,
                tags: geselecteerdeTags.length ? geselecteerdeTags : ['Algemeen'],
                tagClasses: geselecteerdeTagClasses.length ? geselecteerdeTagClasses : ['tag-platform'],
                project: geselecteerdeProjecten.length ? geselecteerdeProjecten : ['Alle projecten'],
                auteur: 'Luke',
                datum: new Date().toLocaleDateString('nl-NL', { day: '2-digit', month: 'short' }),
                inhoud: `<p>${document.getElementById('k-inhoud').value.replace(/\n/g, '</p><p>')}</p>`,
                bronnen,
                voorbeelden
            };

            const items = JSON.parse(localStorage.getItem('kennis-items') || '[]');
            items.push(item);
            localStorage.setItem('kennis-items', JSON.stringify(items));

            window.location.href = 'kennis-hub.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const projecten = JSON.parse(localStorage.getItem('projecten') || '[]');
            const standaard = ['Libéma open', 'ZLM Tour'];
            const alle = [...new Set([...standaard, ...projecten])];
            const wrap = document.getElementById('project-selectie');

            alle.forEach(naam => {
                const btn = document.createElement('button');
                btn.className = 'project-btn';
                btn.textContent = naam;
                btn.onclick = () => toggleProject(btn);
                wrap.appendChild(btn);
            });
        });
    </script>
</body>

</html>
